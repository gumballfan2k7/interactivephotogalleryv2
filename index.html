<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Accessible Interactive Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="initializeGallery()">

    <main>
        <h1 id="image">Hover over an image below to display here.</h1>
        
        <div class="gallery-container">
            <img class="preview" alt="Serene misty mountains at dawn" src="https://picsum.photos/id/10/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
            
            <img class="preview" alt="A quiet path winding through a rocky waterfall" src="https://picsum.photos/id/15/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
            
            <img class="preview" alt="Close-up of vibrant green tropical leaves" src="https://picsum.photos/id/28/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
            
            <img class="preview" alt="Beautiful city by night time" src="https://picsum.photos/id/43/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
            
            <img class="preview" alt="Calm workplace in a small room" src="https://picsum.photos/id/48/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
            
            <img class="preview" alt="Quiet alley in a little city" src="https://picsum.photos/id/57/800/600" onmouseover="upDate(this)" onmouseleave="undo()">
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
